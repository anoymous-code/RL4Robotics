site_name: RL4Robotics · 移动操作学习实验室
site_description: 强化学习 × 世界模型 × VLA —— 从零搭建养老场景双臂移动操作机器人（分药 / 量血压）的学习记录与知识库
site_author: RL4Robotics
site_url: https://anoymous-code.github.io/RL4Robotics/
repo_url: https://github.com/anoymous-code/RL4Robotics
repo_name: RL4Robotics
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  # 关闭 Google Fonts（国内网络环境下加载缓慢/失败）
  font: false
  icon:
    logo: material/robot-industrial
    repo: fontawesome/brands/git-alt
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      separator: '[\s\u200b\-]'

extra_css:
  - assets/css/extra.css

# 本地 mermaid，避免从 unpkg CDN 加载失败（Material 检测到全局 mermaid 后会直接使用）
extra_javascript:
  - assets/js/mermaid.min.js

nav:
  - 首页: index.md
  - 学习路线图: roadmap.md
  - 核心概念:
      - 第一课 · 三大技术支柱总览: concepts/overview.md
      - 第二课 · 从脚本控制到学习策略: concepts/from-script-to-policy.md
      - 术语表: concepts/glossary.md
  - 目标任务:
      - 任务总览: tasks/index.md
      - 任务 A · 自动分药: tasks/pill-sorting.md
      - 任务 B · 测量血压: tasks/blood-pressure.md
  - 硬件平台:
      - 选型初探: hardware/index.md
  - 学习日志:
      - 日志索引: journal/index.md
      - "2026-07-19 (下) · ACT+世界模型": journal/2026-07-19-wm.md
      - "2026-07-19 · 蒸馏首战：负迁移复盘": journal/2026-07-19-distill.md
      - "2026-07-18 (深夜) · RL 精修 40%→92%": journal/2026-07-18-rl.md
      - "2026-07-18 (夜) · 首个学习策略 75%": journal/2026-07-18-result.md
      - "2026-07-18 (深夜) · 0/20 失败解剖": journal/2026-07-18-debug.md
      - "2026-07-18 (晚) · ACT 训练启动": journal/2026-07-18-act.md
      - "2026-07-18 (下) · 学习管线开工": journal/2026-07-18-pipeline.md
      - "2026-07-18 · 移动机器人分药 v5": journal/2026-07-18-mobile.md
      - "2026-07-17 (晚) · 分药 v3 全闭环": journal/2026-07-17-full.md
      - "2026-07-17 (下) · 撕剪分药 v2": journal/2026-07-17-tear.md
      - "2026-07-17 · 三机位可视化": journal/2026-07-17.md
      - "2026-07-10 · 启程": journal/2026-07-10.md
  - 资源库: resources.md
